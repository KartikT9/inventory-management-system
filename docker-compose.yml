services:
  postgres:
    image: postgres:16-alpine

    environment:
      POSTGRES_DB: inventory
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build: ./backend

    ports:
      - "8000:8000"

    depends_on:
      - postgres

    env_file:
      - ./backend/.env

  frontend:
    build: ./frontend

    ports:
      - "5173:5173"

    depends_on:
      - backend

volumes:
  postgres_data: